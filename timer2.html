<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20:00 - Focus Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .timer-display {
            font-variant-numeric: tabular-nums;
        }
        .lucide {
            width: 1.5em;
            height: 1.5em;
            stroke-width: 2;
        }
    </style>
</head>
<body class="bg-green-500">
    <div class="flex flex-col items-center justify-center p-4 w-full max-w-md mx-auto">
        <div id="timer" class="text-white text-8xl font-bold timer-display mb-8 md:text-9xl">
            20:00
        </div>

        <div class="flex space-x-4">
            <button id="pauseButton" class="bg-white text-yellow-700 px-6 py-3 rounded-full shadow-lg hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-yellow-300 transition duration-300 ease-in-out text-lg font-semibold flex items-center justify-center">
                <i data-lucide="pause" class="lucide"></i>
            </button>
            <button id="skipButton" class="bg-white text-blue-700 px-6 py-3 rounded-full shadow-lg hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-blue-300 transition duration-300 ease-in-out text-lg font-semibold flex items-center justify-center">
                <i data-lucide="skip-forward" class="lucide"></i>
            </button>
            <button id="resetButton" class="bg-white text-red-700 px-6 py-3 rounded-full shadow-lg hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-red-300 transition duration-300 ease-in-out text-lg font-semibold flex items-center justify-center">
                <i data-lucide="rotate-ccw" class="lucide"></i>
            </button>
            <button id="muteButton" class="bg-white text-gray-700 px-6 py-3 rounded-full shadow-lg hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-gray-300 transition duration-300 ease-in-out text-lg font-semibold flex items-center justify-center">
                <i data-lucide="volume-2" class="lucide"></i>
            </button>
        </div>
    </div>

    <!-- Shown only when browser blocks autoplay audio (iOS requires a gesture) -->
    <div id="audioHint" class="hidden fixed inset-0 flex items-end justify-center pb-16 pointer-events-none">
        <div class="bg-white bg-opacity-20 text-white text-lg font-semibold px-6 py-3 rounded-full backdrop-blur-sm">
            Tap anywhere to enable sound
        </div>
    </div>

    <audio id="backgroundMusic" preload="auto"></audio>
    <audio id="alarmMusic" preload="auto"></audio>

    <script>
        const timerDisplay = document.getElementById('timer');
        const pauseButton = document.getElementById('pauseButton');
        const skipButton = document.getElementById('skipButton');
        const resetButton = document.getElementById('resetButton');
        const muteButton = document.getElementById('muteButton');
        const audioHint = document.getElementById('audioHint');
        const body = document.body;
        const backgroundMusic = document.getElementById('backgroundMusic');
        const alarmMusic = document.getElementById('alarmMusic');

        // Unlock audio on first user gesture (iOS autoplay policy)
        function unlockAudio() {
            audioHint.classList.add('hidden');
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('click', unlockAudio);
            if (isRunning && !isMuted) {
                backgroundMusic.play().catch(() => {});
            }
        }

        const DURATION = 20 * 60;
        let playlist = [];
        const alarmPath = 'alarm/alarm1.mp3';

        async function buildPlaylist() {
            const found = [];
            for (let i = 1; i <= 50; i++) {
                const path = `songs/${i}.mp3`;
                const ok = await new Promise(resolve => {
                    const a = new Audio();
                    a.addEventListener('loadedmetadata', () => resolve(true), { once: true });
                    a.addEventListener('error', () => resolve(false), { once: true });
                    a.src = path;
                });
                if (ok) found.push(path);
                else break;
            }
            playlist = found.length > 0 ? found : ['songs/1.mp3', 'songs/2.mp3', 'songs/3.mp3'];
        }

        let currentSongIndex = 0;
        let timeLeft = DURATION;
        let timerInterval;
        let isRunning = false;
        let isMuted = false;
        let alarmTriggered = false;
        let fadeInterval = null;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function playCurrentSong() {
            if (!isMuted && playlist.length > 0) {
                backgroundMusic.src = playlist[currentSongIndex];
                backgroundMusic.load();
                backgroundMusic.play().catch(() => {});
            }
        }

        function playNextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            playCurrentSong();
        }

        function startAlarmSequence() {
            if (alarmTriggered) return;
            alarmTriggered = true;

            if (fadeInterval) clearInterval(fadeInterval);

            const steps = 40;
            const stepVol = backgroundMusic.volume / steps;

            fadeInterval = setInterval(() => {
                if (backgroundMusic.volume > stepVol) {
                    backgroundMusic.volume -= stepVol;
                } else {
                    backgroundMusic.volume = 0;
                    backgroundMusic.pause();
                    backgroundMusic.currentTime = 0;
                    clearInterval(fadeInterval);
                    fadeInterval = null;

                    alarmMusic.src = alarmPath;
                    alarmMusic.loop = true;
                    alarmMusic.play().catch(() => {});
                }
            }, 4000 / steps);
        }

        function updateTimer() {
            const formatted = formatTime(timeLeft);
            timerDisplay.textContent = formatted;
            document.title = `${formatted} - Focus Timer`;

            if (timeLeft > 10 * 60) {
                body.className = 'bg-green-500';
            } else if (timeLeft > 5 * 60) {
                body.className = 'bg-yellow-500';
            } else {
                body.className = 'bg-red-500';
            }

            if (timeLeft <= 5 && timeLeft > 0 && !alarmTriggered) {
                startAlarmSequence();
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                isRunning = false;
                timerDisplay.textContent = '00:00';
                document.title = "Time's Up! - Focus Timer";
                backgroundMusic.pause();
                if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
            } else {
                timeLeft--;
            }
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timerInterval = setInterval(updateTimer, 1000);
                if (!isMuted) {
                    backgroundMusic.play().catch(() => {
                        // Autoplay blocked — wait for first user gesture
                        audioHint.classList.remove('hidden');
                        document.addEventListener('touchstart', unlockAudio, { once: true });
                        document.addEventListener('click', unlockAudio, { once: true });
                    });
                }
                updatePauseButton(true);
            }
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            backgroundMusic.pause();
            alarmMusic.pause();
            if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; backgroundMusic.volume = 1; }
            document.title = `Paused - ${formatTime(timeLeft)} - Focus Timer`;
            updatePauseButton(false);
        }

        function togglePause() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function updatePauseButton(running) {
            const icon = pauseButton.querySelector('.lucide');
            icon.setAttribute('data-lucide', running ? 'pause' : 'play');
            pauseButton.className = running
                ? 'bg-white text-yellow-700 px-6 py-3 rounded-full shadow-lg hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-yellow-300 transition duration-300 ease-in-out text-lg font-semibold flex items-center justify-center'
                : 'bg-white text-green-700 px-6 py-3 rounded-full shadow-lg hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-green-300 transition duration-300 ease-in-out text-lg font-semibold flex items-center justify-center';
            lucide.createIcons();
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = DURATION;
            alarmTriggered = false;
            backgroundMusic.volume = 1;
            backgroundMusic.currentTime = 0;
            alarmMusic.currentTime = 0;
            alarmMusic.pause();
            currentSongIndex = Math.floor(Math.random() * playlist.length);
            backgroundMusic.src = playlist[currentSongIndex];
            backgroundMusic.load();
            updateTimer();
            document.title = '20:00 - Focus Timer';
        }

        function toggleMute() {
            isMuted = !isMuted;
            backgroundMusic.muted = isMuted;
            const icon = muteButton.querySelector('.lucide');
            if (isMuted) {
                icon.setAttribute('data-lucide', 'volume-x');
                backgroundMusic.pause();
            } else {
                icon.setAttribute('data-lucide', 'volume-2');
                if (isRunning && timeLeft > 5) {
                    backgroundMusic.play().catch(() => {});
                }
            }
            lucide.createIcons();
        }

        backgroundMusic.addEventListener('ended', playNextSong);
        pauseButton.addEventListener('click', togglePause);
        skipButton.addEventListener('click', playNextSong);
        resetButton.addEventListener('click', resetTimer);
        muteButton.addEventListener('click', toggleMute);

        // Auto-start on page load
        window.addEventListener('load', async () => {
            lucide.createIcons();

            alarmMusic.src = alarmPath;
            alarmMusic.load();

            await buildPlaylist();

            currentSongIndex = Math.floor(Math.random() * playlist.length);
            backgroundMusic.src = playlist[currentSongIndex];
            backgroundMusic.load();

            updateTimer();
            startTimer();
        });
    </script>
</body>
</html>
